<div class="dashboard-container">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="logo">
      <h2>👥 CollabWork</h2>
    </div>

    <nav>
      <ul>
        <li routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          🏠 Home
        </li>

        @if(currentUser?.role === 'ADMIN'){
          <li routerLink="/dashboard/users" routerLinkActive="active">
            👥 User Management
          </li>
        }

        <li>
          📁 Projects
        </li>

        <li>
          ✅ Tasks
        </li>

        <li>
          📄 Documents
        </li>

        <li>
          📂 Files
        </li>

        <li>
          💬 Chat
        </li>
      </ul>
    </nav>

  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Navbar -->
    <header class="navbar">

      <div class="page-title">
        🏠 Home
      </div>

      <div class="navbar-right">

        <div class="notification">
          🔔
        </div>

        <div
          class="profile"
          (click)="toggleProfileMenu()">
          👤 {{ currentUser?.name }} ▼

          @if(showProfileMenu){
            <div class="profile-menu">
              <div class="profile-header">
                <h4>{{ currentUser?.name }}</h4>
                <small>{{ currentUser?.role }}</small>
              </div>
              <hr>
              <button>
                👤 My Profile
              </button>
              <button (click)="logout()">
                🚪 Logout
              </button>
            </div>
          }
        </div>

      </div>

    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
